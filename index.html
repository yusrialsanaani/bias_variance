document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ge-thumb{ width:20px; height:20px; border-radius:50%; background:#fff; border:2.5px solid #E8566E; box-shadow:0 2px 7px rgba(43,39,34,.25); cursor:pointer; }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"min-height:100vh; background:#FBF9F5; font-family:'Hanken Grotesk',system-ui,sans-serif; color:#2B2722; -webkit-font-smoothing:antialiased;\">\n\n  <div style=\"position:sticky; top:0; z-index:30; background:rgba(251,249,245,.9); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); border-bottom:1px solid #E7E2DA;\">\n    <div style=\"max-width:1180px; margin:0 auto; padding:13px 28px; display:flex; align-items:center; gap:22px; flex-wrap:wrap;\">\n      <div style=\"display:flex; flex-direction:column; gap:2px; min-width:150px;\">\n        <span style=\"font:600 11px/1 'Hanken Grotesk'; letter-spacing:.16em; text-transform:uppercase; color:#B7AFA4;\">Model complexity<\u002Fspan>\n        <span style=\"font-size:13px; color:#8C8379; line-height:1.2;\">{{ regimeNote }}<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"flex:1; min-width:230px; display:flex; align-items:center; gap:13px;\">\n        <span style=\"font-size:12px; color:#A99F93; white-space:nowrap;\">Simple<\u002Fspan>\n        <div style=\"flex:1; padding:8px 0;\">\n          <input type=\"range\" min=\"0\" max=\"1\" step=\"0.001\" value=\"{{ c }}\" oninput=\"{{ onSlide }}\" style=\"{{ sliderInputStyle }}\">\n        <\u002Fdiv>\n        <span style=\"font-size:12px; color:#A99F93; white-space:nowrap;\">Complex<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex; gap:7px; align-items:center;\">\n        <button onclick=\"{{ setUnder }}\" style=\"padding:7px 12px; border-radius:9px; border:1px solid #E7E2DA; background:#fff; color:#6E665D; font:500 13px 'Hanken Grotesk'; cursor:pointer;\" style-hover=\"background:#F3EFE8;\">Underfit<\u002Fbutton>\n        <button onclick=\"{{ setJust }}\" style=\"padding:7px 12px; border-radius:9px; border:1px solid #E7E2DA; background:#fff; color:#6E665D; font:500 13px 'Hanken Grotesk'; cursor:pointer;\" style-hover=\"background:#F3EFE8;\">Just right<\u002Fbutton>\n        <button onclick=\"{{ setOver }}\" style=\"padding:7px 12px; border-radius:9px; border:1px solid #E7E2DA; background:#fff; color:#6E665D; font:500 13px 'Hanken Grotesk'; cursor:pointer;\" style-hover=\"background:#F3EFE8;\">Overfit<\u002Fbutton>\n      <\u002Fdiv>\n      <div style=\"{{ regimePillStyle }}\">{{ regime }}<\u002Fdiv>\n      <button onclick=\"{{ togglePlay }}\" style=\"display:inline-flex; align-items:center; gap:7px; padding:8px 14px; border-radius:9px; border:none; background:#2B2722; color:#fff; font:600 13px 'Hanken Grotesk'; cursor:pointer;\" style-hover=\"background:#423c34;\"><span style=\"font-size:10px;\">{{ playGlyph }}<\u002Fspan>{{ playLabel }}<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"max-width:1180px; margin:0 auto; padding:34px 28px 70px;\">\n\n    <div style=\"margin-bottom:30px;\">\n      <div style=\"font:600 12px/1 'Hanken Grotesk'; letter-spacing:.18em; text-transform:uppercase; color:#E8566E; margin-bottom:14px;\">Interactive explainer<\u002Fdiv>\n      <h1 style=\"font-family:'Newsreader',serif; font-weight:500; font-size:48px; line-height:1.03; letter-spacing:-.015em; margin:0 0 13px;\">The Bias–Variance Trade-off<\u002Fh1>\n      <p style=\"margin:0; max-width:700px; font-size:17px; line-height:1.55; color:#6E665D;\">Drag the control above to move one model from too-simple to too-complex. The same shift plays out three ways at once — as aim on a target, as a curve through data, and as the error it leaves behind.<\u002Fp>\n    <\u002Fdiv>\n\n    <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(330px,1fr)); gap:20px; margin-bottom:22px;\">\n\n      <div style=\"background:#fff; border:1px solid #E7E2DA; border-radius:16px; box-shadow:0 1px 2px rgba(43,39,34,.04), 0 22px 46px -30px rgba(43,39,34,.28); padding:22px;\">\n        <div style=\"display:flex; align-items:baseline; justify-content:space-between; gap:10px;\">\n          <span style=\"font:600 11px/1 'Hanken Grotesk'; letter-spacing:.16em; text-transform:uppercase; color:#B7AFA4;\">The target<\u002Fspan>\n          <span style=\"font-size:12px; color:#A99F93;\">aim&nbsp;=&nbsp;bias · spread&nbsp;=&nbsp;variance<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"width:100%; aspect-ratio:1/1; max-width:300px; margin:8px auto 2px;\">{{ targetViz }}<\u002Fdiv>\n        <div style=\"margin-top:8px; display:flex; flex-direction:column; gap:11px;\">\n          <div>\n            <div style=\"display:flex; justify-content:space-between; font-size:13px; margin-bottom:5px;\"><span style=\"color:#4A443C; font-weight:500;\"><span style=\"color:#4E7CB0;\">●<\u002Fspan> Bias — distance off-center<\u002Fspan><span style=\"color:#8C8379;\">{{ aimPctTxt }}<\u002Fspan><\u002Fdiv>\n            <div style=\"height:7px; background:#ECE6DD; border-radius:99px; overflow:hidden;\"><div style=\"{{ aimBarStyle }}\"><\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <div style=\"display:flex; justify-content:space-between; font-size:13px; margin-bottom:5px;\"><span style=\"color:#4A443C; font-weight:500;\"><span style=\"color:#E8566E;\">●<\u002Fspan> Variance — spread of shots<\u002Fspan><span style=\"color:#8C8379;\">{{ spreadPctTxt }}<\u002Fspan><\u002Fdiv>\n            <div style=\"height:7px; background:#ECE6DD; border-radius:99px; overflow:hidden;\"><div style=\"{{ spreadBarStyle }}\"><\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"background:#fff; border:1px solid #E7E2DA; border-radius:16px; box-shadow:0 1px 2px rgba(43,39,34,.04), 0 22px 46px -30px rgba(43,39,34,.28); padding:22px;\">\n        <div style=\"display:flex; align-items:baseline; justify-content:space-between; gap:10px;\">\n          <span style=\"font:600 11px/1 'Hanken Grotesk'; letter-spacing:.16em; text-transform:uppercase; color:#B7AFA4;\">Fitting the data<\u002Fspan>\n          <span style=\"font-size:12px; color:#A99F93;\">one model, varying flexibility<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"width:100%; aspect-ratio:440/380; margin-top:8px; overflow:visible;\">{{ fitViz }}<\u002Fdiv>\n        <div style=\"margin-top:10px; display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap;\">\n          <div style=\"display:flex; gap:14px; font-size:12px; color:#8C8379;\">\n            <span><span style=\"color:#6E9BC9;\">●<\u002Fspan> Data<\u002Fspan>\n            <span><span style=\"color:#E8566E;\">▬<\u002Fspan> Model fit<\u002Fspan>\n            <span><span style=\"color:#B7AFA4;\">┄<\u002Fspan> True f(x)<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex; gap:9px;\">\n            <div style=\"padding:5px 11px; border-radius:8px; background:#EEF3F8; font-size:12.5px;\"><span style=\"color:#6E665D;\">Train<\u002Fspan> <strong style=\"color:#34689B;\">{{ trainTxt }}<\u002Fstrong><\u002Fdiv>\n            <div style=\"padding:5px 11px; border-radius:8px; background:#FBEAEE; font-size:12.5px;\"><span style=\"color:#6E665D;\">Test<\u002Fspan> <strong style=\"color:#C8344C;\">{{ testTxt }}<\u002Fstrong><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"background:#fff; border:1px solid #E7E2DA; border-radius:16px; box-shadow:0 1px 2px rgba(43,39,34,.04), 0 22px 46px -30px rgba(43,39,34,.28); padding:22px;\">\n        <div style=\"display:flex; align-items:baseline; justify-content:space-between; gap:10px;\">\n          <span style=\"font:600 11px/1 'Hanken Grotesk'; letter-spacing:.16em; text-transform:uppercase; color:#B7AFA4;\">Error decomposition<\u002Fspan>\n          <span style=\"{{ minBadgeStyle }}\">✓ Minimum total error<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"width:100%; aspect-ratio:440/380; margin-top:8px; overflow:visible;\">{{ errorViz }}<\u002Fdiv>\n        <div style=\"margin-top:10px; display:flex; gap:8px; flex-wrap:wrap;\">\n          <div style=\"flex:1; min-width:84px; padding:8px 10px; border-radius:9px; background:#EEF3F8;\"><div style=\"font-size:11px; color:#8C8379; margin-bottom:2px;\"><span style=\"color:#4E7CB0;\">●<\u002Fspan> Bias²<\u002Fdiv><div style=\"font-size:18px; font-weight:600; color:#34689B;\">{{ biasSqTxt }}<\u002Fdiv><\u002Fdiv>\n          <div style=\"flex:1; min-width:84px; padding:8px 10px; border-radius:9px; background:#FBEAEE;\"><div style=\"font-size:11px; color:#8C8379; margin-bottom:2px;\"><span style=\"color:#E8566E;\">●<\u002Fspan> Variance<\u002Fdiv><div style=\"font-size:18px; font-weight:600; color:#C8344C;\">{{ varTxt }}<\u002Fdiv><\u002Fdiv>\n          <div style=\"flex:1; min-width:84px; padding:8px 10px; border-radius:9px; background:#F2EEE6;\"><div style=\"font-size:11px; color:#8C8379; margin-bottom:2px;\">Irreducible<\u002Fdiv><div style=\"font-size:18px; font-weight:600; color:#8C8379;\">{{ irrTxt }}<\u002Fdiv><\u002Fdiv>\n          <div style=\"flex:1; min-width:84px; padding:8px 10px; border-radius:9px; background:#FBF1DC;\"><div style=\"font-size:11px; color:#8C8379; margin-bottom:2px;\"><span style=\"color:#DDA02E;\">●<\u002Fspan> Total<\u002Fdiv><div style=\"font-size:18px; font-weight:700; color:#B07B16;\">{{ totalTxt }}<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n\n    <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(330px,1fr)); gap:20px; margin-bottom:22px;\">\n\n      <div style=\"position:relative; background:#fff; border:1px solid #E7E2DA; border-radius:16px; box-shadow:0 1px 2px rgba(43,39,34,.04); padding:24px;\">\n        <div style=\"{{ biasGlowStyle }}\"><\u002Fdiv>\n        <div style=\"position:relative;\">\n          <div style=\"display:flex; align-items:center; gap:11px; margin-bottom:12px;\">\n            <span style=\"font-family:'Newsreader',serif; font-weight:500; font-size:27px; color:#2B2722;\">Bias<\u002Fspan>\n            <span style=\"padding:3px 9px; border-radius:99px; background:#EEF3F8; color:#34689B; font-size:11.5px; font-weight:600; letter-spacing:.02em;\">underfitting<\u002Fspan>\n          <\u002Fdiv>\n          <p style=\"margin:0 0 14px; font-size:15px; line-height:1.55; color:#5C564E;\">The gap between a model's average prediction and the truth. High bias means the model is too rigid to capture the real pattern.<\u002Fp>\n          <div style=\"background:#FAF7F2; border:1px solid #ECE6DD; border-radius:10px; padding:12px 15px; margin-bottom:16px; font-family:'Newsreader',serif; font-style:italic; font-size:20px; color:#2B2722;\">bias = <span style=\"font-style:normal;\">𝔼<\u002Fspan>[ f̂(x) ] − f(x)<\u002Fdiv>\n          <div style=\"display:flex; flex-direction:column; gap:2px;\">\n            <div style=\"display:flex; align-items:center; gap:11px; padding:5px 0;\"><span style=\"color:#4E7CB0; font-weight:700;\">→<\u002Fspan><span style=\"font-size:15px; color:#4A443C;\">Overly-simplified model<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex; align-items:center; gap:11px; padding:5px 0;\"><span style=\"color:#4E7CB0; font-weight:700;\">→<\u002Fspan><span style=\"font-size:15px; color:#4A443C;\">Under-fits the training data<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex; align-items:center; gap:11px; padding:5px 0;\"><span style=\"color:#4E7CB0; font-weight:700;\">→<\u002Fspan><span style=\"font-size:15px; color:#4A443C;\">High error on both train and test<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"position:relative; background:#fff; border:1px solid #E7E2DA; border-radius:16px; box-shadow:0 1px 2px rgba(43,39,34,.04); padding:24px;\">\n        <div style=\"{{ varGlowStyle }}\"><\u002Fdiv>\n        <div style=\"position:relative;\">\n          <div style=\"display:flex; align-items:center; gap:11px; margin-bottom:12px;\">\n            <span style=\"font-family:'Newsreader',serif; font-weight:500; font-size:27px; color:#2B2722;\">Variance<\u002Fspan>\n            <span style=\"padding:3px 9px; border-radius:99px; background:#FBEAEE; color:#C8344C; font-size:11.5px; font-weight:600; letter-spacing:.02em;\">overfitting<\u002Fspan>\n          <\u002Fdiv>\n          <p style=\"margin:0 0 14px; font-size:15px; line-height:1.55; color:#5C564E;\">How much a model's predictions swing when the training data changes. High variance means it chases noise instead of signal.<\u002Fp>\n          <div style=\"background:#FAF7F2; border:1px solid #ECE6DD; border-radius:10px; padding:12px 15px; margin-bottom:16px; font-family:'Newsreader',serif; font-style:italic; font-size:20px; color:#2B2722;\">variance = <span style=\"font-style:normal;\">𝔼<\u002Fspan>[ ( f̂(x) − <span style=\"font-style:normal;\">𝔼<\u002Fspan>[f̂(x)] )² ]<\u002Fdiv>\n          <div style=\"display:flex; flex-direction:column; gap:2px;\">\n            <div style=\"display:flex; align-items:center; gap:11px; padding:5px 0;\"><span style=\"color:#E8566E; font-weight:700;\">→<\u002Fspan><span style=\"font-size:15px; color:#4A443C;\">Overly-complex model<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex; align-items:center; gap:11px; padding:5px 0;\"><span style=\"color:#E8566E; font-weight:700;\">→<\u002Fspan><span style=\"font-size:15px; color:#4A443C;\">Over-fits the training data<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex; align-items:center; gap:11px; padding:5px 0;\"><span style=\"color:#E8566E; font-weight:700;\">→<\u002Fspan><span style=\"font-size:15px; color:#4A443C;\">Low error on train, high on test<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex; align-items:center; gap:11px; padding:5px 0;\"><span style=\"color:#E8566E; font-weight:700;\">→<\u002Fspan><span style=\"font-size:15px; color:#4A443C;\">Starts modelling the noise in the input<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n\n    <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(330px,1fr)); gap:20px;\">\n\n      <div style=\"background:#fff; border:1px solid #E7E2DA; border-radius:16px; box-shadow:0 1px 2px rgba(43,39,34,.04); padding:24px;\">\n        <span style=\"font:600 11px/1 'Hanken Grotesk'; letter-spacing:.16em; text-transform:uppercase; color:#B7AFA4;\">The four cases<\u002Fspan>\n        <p style=\"margin: 10px 0 18px; font-size: 18px; color: #8C8379; line-height: 1.5\">Bias is how far the cluster sits from the bullseye; variance is how scattered it is. Your model rides the dotted path as complexity changes.<\u002Fp>\n        <div style=\"display:grid; grid-template-columns:24px 1fr; gap:8px;\">\n          <div style=\"display:grid; grid-template-rows:1fr 1fr;\">\n            <div style=\"display:flex; align-items:center; justify-content:center;\"><span style=\"writing-mode:vertical-rl; transform:rotate(180deg); font-size:12px; font-weight:600; letter-spacing:.06em; color:#8C8379;\">LOW VARIANCE<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex; align-items:center; justify-content:center;\"><span style=\"writing-mode:vertical-rl; transform:rotate(180deg); font-size:12px; font-weight:600; letter-spacing:.06em; color:#8C8379;\">HIGH VARIANCE<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <div style=\"display:grid; grid-template-columns:1fr 1fr; text-align:center; margin-bottom:7px;\">\n              <span style=\"font-size:12px; font-weight:600; letter-spacing:.06em; color:#8C8379;\">LOW BIAS<\u002Fspan>\n              <span style=\"font-size:12px; font-weight:600; letter-spacing:.06em; color:#8C8379;\">HIGH BIAS<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"position:relative; display:grid; grid-template-columns:1fr 1fr; grid-template-rows:1fr 1fr; border:1px solid #E7E2DA; border-radius:13px; overflow:hidden; background:#fff;\">\n              <div style=\"position:relative; padding:12px; border-right:1px solid #EFEAE2; border-bottom:1px solid #EFEAE2;\"><span style=\"position:absolute; top:8px; left:11px; font-size:11px; font-weight:600; color:#2E7D46;\">Goal<\u002Fspan>{{ quadLL }}<\u002Fdiv>\n              <div style=\"position:relative; padding:12px; border-bottom:1px solid #EFEAE2;\"><span style=\"position:absolute; top:8px; left:11px; font-size:11px; font-weight:600; color:#4E7CB0;\">Underfit<\u002Fspan>{{ quadHL }}<\u002Fdiv>\n              <div style=\"position:relative; padding:12px; border-right:1px solid #EFEAE2;\"><span style=\"position:absolute; top:8px; left:11px; font-size:11px; font-weight:600; color:#E8566E;\">Overfit<\u002Fspan>{{ quadLH }}<\u002Fdiv>\n              <div style=\"position:relative; padding:12px;\"><span style=\"position:absolute; top:8px; left:11px; font-size:11px; font-weight:600; color:#9A8F82;\">Worst<\u002Fspan>{{ quadHH }}<\u002Fdiv>\n              <svg viewBox=\"0 0 100 100\" preserveAspectRatio=\"none\" style=\"position:absolute; inset:0; width:100%; height:100%; pointer-events:none;\"><line x1=\"75\" y1=\"25\" x2=\"25\" y2=\"75\" stroke=\"#2B2722\" stroke-width=\"0.5\" stroke-dasharray=\"2 2\" opacity=\"0.4\"><\u002Fline><\u002Fsvg>\n              <div style=\"{{ quadMarkerStyle }}\"><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"background:#fff; border:1px solid #E7E2DA; border-radius:16px; box-shadow:0 1px 2px rgba(43,39,34,.04); padding:30px 28px; display:flex; flex-direction:column; justify-content:space-between; gap:22px;\">\n        <div>\n          <span style=\"font:600 11px/1 'Hanken Grotesk'; letter-spacing:.16em; text-transform:uppercase; color:#B7AFA4;\">The trade-off<\u002Fspan>\n          <div style=\"margin:14px 0 0; font-family:'Newsreader',serif; font-size:26px; line-height:1.3; color:#2B2722;\">Total error = <span style=\"color:#34689B;\">Bias²<\u002Fspan> + <span style=\"color:#C8344C;\">Variance<\u002Fspan> + <span style=\"color:#8C8379;\">Irreducible error<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:18px;\">\n          <div style=\"display:flex; gap:12px;\"><span style=\"color: #DDA02E; font-weight: 700; font-size: 20px\">01<\u002Fspan><span style=\"font-size: 20px; line-height: 1.5; color: #4A443C\">Push bias down and variance tends to rise — and the reverse. You can't drive both to zero at once.<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; gap:12px;\"><span style=\"color: #DDA02E; font-weight: 700; font-size: 20px\">02<\u002Fspan><span style=\"font-size: 20px; line-height: 1.5; color: #4A443C\">The best model is the one where <em>total<\u002Fem> error bottoms out — not where either piece alone does.<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; gap:12px;\"><span style=\"color: #DDA02E; font-weight: 700; font-size: 20px\">03<\u002Fspan><span style=\"font-size: 20px; line-height: 1.5; color: #4A443C\">Some error is irreducible: noise in the data sets a floor no model can cross.<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:10px;\">\n          <div style=\"display:flex; align-items:flex-start; gap:10px; padding:11px 14px; background:#EEF3F8; border-radius:10px;\"><span style=\"font-weight: 700; color: #34689B; font-size: 20px; white-space: nowrap\">Small data<\u002Fspan><span style=\"font-size: 20px; color: #4A443C; line-height: 1.4\">→ lean simpler, accept some bias.<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; align-items:flex-start; gap:10px; padding:11px 14px; background:#FBEAEE; border-radius:10px;\"><span style=\"font-weight: 700; color: #C8344C; font-size: 20px; white-space: nowrap\">Large data<\u002Fspan><span style=\"font-size: 20px; color: #4A443C; line-height: 1.4; font-weight: 400\">→ afford complexity, accept some variance.<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;$preview&quot;: { &quot;width&quot;: 1180, &quot;height&quot;: 1480 },\n  &quot;sampleSize&quot;: { &quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 18, &quot;min&quot;: 10, &quot;max&quot;: 36, &quot;step&quot;: 1, &quot;tsType&quot;: &quot;number&quot;, &quot;section&quot;: &quot;Data&quot;, &quot;unit&quot;: &quot;points&quot; },\n  &quot;noiseLevel&quot;: { &quot;editor&quot;: &quot;range&quot;, &quot;default&quot;: 0.15, &quot;min&quot;: 0.04, &quot;max&quot;: 0.28, &quot;step&quot;: 0.01, &quot;tsType&quot;: &quot;number&quot;, &quot;section&quot;: &quot;Data&quot; },\n  &quot;numShots&quot;: { &quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 10, &quot;min&quot;: 7, &quot;max&quot;: 12, &quot;step&quot;: 1, &quot;tsType&quot;: &quot;number&quot;, &quot;section&quot;: &quot;Target&quot;, &quot;unit&quot;: &quot;throws&quot; },\n  &quot;showTrueCurve&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Display&quot; }\n}\">\nclass Component extends DCLogic {\n  state = { c: 0.5, playing: false };\n\n  componentDidMount(){\n    this._dir = 1;\n    const loop = () => {\n      if(this.state.playing){\n        let c = this.state.c + 0.0036 * this._dir;\n        if(c >= 1){ c = 1; this._dir = -1; }\n        else if(c <= 0){ c = 0; this._dir = 1; }\n        this.setState({ c });\n      }\n      this._raf = requestAnimationFrame(loop);\n    };\n    this._raf = requestAnimationFrame(loop);\n  }\n  componentWillUnmount(){ if(this._raf) cancelAnimationFrame(this._raf); }\n\n  get C(){ return { ink:'#2B2722', mut:'#8C8379', line:'#E7E2DA', coral:'#E8566E', coralL:'#F4A9B6', blue:'#4E7CB0', blueDot:'#6E9BC9', blueStroke:'#34689B', gold:'#DDA02E' }; }\n  get irr(){ const n = this.props.noiseLevel ?? 0.15; return n*n; }\n\n  rng(seed){ let a = (seed>>>0)||1; return () => { a |= 0; a = a + 0x6D2B79F5 | 0; let t = Math.imul(a ^ a>>>15, 1|a); t = t + Math.imul(t ^ t>>>7, 61|t) ^ t; return ((t ^ t>>>14)>>>0)/4294967296; }; }\n  gauss(rand){ let u=0,v=0; while(u===0)u=rand(); while(v===0)v=rand(); return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v); }\n\n  trueF(x){ return 4*(x-0.5)*(x-0.5); }\n\n  cfg(){\n    const N = Math.max(10, Math.min(36, Math.round(this.props.sampleSize ?? 18)));\n    const noise = this.props.noiseLevel ?? 0.15;\n    const D = Math.min(N-2, 16);\n    return { N, noise, D, cutMax: D+2, expo:1.6, sharp:1.5, B:45, lam0:3e-4 };\n  }\n  feat(x, D){ const a=[]; for(let j=1;j<=D;j++) a.push(Math.cos(j*Math.PI*x)); return a; }\n  penArr(c, cf){ const fc = -0.3 + cf.cutMax*Math.pow(Math.max(0,Math.min(1,c)), cf.expo); const p=[]; for(let j=1;j<=cf.D;j++) p.push(cf.lam0 + cf.B/(1+Math.exp(-(j-fc)*cf.sharp))); return p; }\n\n  solve(A, b){\n    const n = b.length;\n    const M = A.map((row,i)=>row.concat([b[i]]));\n    for(let col=0; col<n; col++){\n      let piv = col;\n      for(let r=col+1;r<n;r++) if(Math.abs(M[r][col])>Math.abs(M[piv][col])) piv=r;\n      const tmp=M[col]; M[col]=M[piv]; M[piv]=tmp;\n      const d = M[col][col] || 1e-9;\n      for(let j=col;j<=n;j++) M[col][j] /= d;\n      for(let r=0;r<n;r++) if(r!==col){ const f=M[r][col]; for(let j=col;j<=n;j++) M[r][j] -= f*M[col][j]; }\n    }\n    return M.map(row=>row[n]);\n  }\n  fitYs(ys, c, cf){\n    const D=cf.D, N=this._xs.length, Phi=this._Phi;\n    const ym = ys.reduce((a,b)=>a+b,0)/N;\n    const A=[], bb=[];\n    for(let a=0;a<D;a++){ A.push(new Array(D).fill(0)); bb.push(0); }\n    for(let i=0;i<N;i++){ const ph=Phi[i], yc=ys[i]-ym; for(let a=0;a<D;a++){ bb[a]+=ph[a]*yc; for(let b=0;b<D;b++) A[a][b]+=ph[a]*ph[b]; } }\n    const pen = this.penArr(c, cf);\n    for(let a=0;a<D;a++) A[a][a] += pen[a];\n    return { w: this.solve(A, bb), ym };\n  }\n  predFrom(fr, x, cf){ const ph=this.feat(x, cf.D); let s=fr.ym; for(let a=0;a<cf.D;a++) s+=fr.w[a]*ph[a]; return s; }\n\n  ensureData(){\n    const cf = this.cfg();\n    const key = cf.N+'|'+cf.noise;\n    if(this._dkey === key) return;\n    this._dkey = key; this._cf = cf;\n    const xs=[]; for(let i=0;i<cf.N;i++) xs.push((i+0.5)/cf.N);\n    this._xs = xs;\n    this._Phi = xs.map(x=>this.feat(x, cf.D));\n    const r = this.rng(98765);\n    this._ys = xs.map(x => this.trueF(x) + this.gauss(r)*cf.noise);\n    // independent held-out (validation) set — fresh noise on a denser grid; honest test error\n    const rt = this.rng(54321), Mt = 40;\n    this._txs = []; this._tys = [];\n    for(let i=0;i<Mt;i++){ const x=(i+0.5)/Mt; this._txs.push(x); this._tys.push(this.trueF(x) + this.gauss(rt)*cf.noise); }\n  }\n  fit(c){ this.ensureData(); const fr=this.fitYs(this._ys, c, this._cf); return (x)=>this.predFrom(fr, x, this._cf); }\n\n  // Canonical bias-variance curves — the textbook figure. bias² decays, variance grows as its\n  // mirror image, total = bias² + variance + irreducible → a U whose minimum sits at the centre.\n  // k sets the steepness; the floor is the noise variance. Cached by (N, noise).\n  ensureDecomp(){\n    this.ensureData();\n    const key = this._dkey + '|analytic';\n    if(this._gkey === key) return;\n    this._gkey = key;\n    const k = 3.0, STEPS = 61;\n    const cs=[], bias2=[], varc=[], total=[];\n    const sig2 = this._cf.noise*this._cf.noise;\n    for(let s=0;s<STEPS;s++){\n      const c=s/(STEPS-1); cs.push(c);\n      const b = Math.exp(-k*c);       // bias² : high → low (smooth convex decay)\n      const v = Math.exp(k*(c-1));    // variance: low → high (mirror image of bias)\n      bias2.push(b); varc.push(v); total.push(b+v+sig2);\n    }\n    this._grid = { cs, bias2, varc, total, cStar:0.5, sig2,\n      biasMax: 1, stdMax: 1, yMax: Math.max(...total)*1.08 };\n  }\n  lerpArr(arr, c){ const n=arr.length, t=Math.max(0,Math.min(1,c))*(n-1), i=Math.floor(t), f=t-i; return i>=n-1?arr[n-1]:arr[i]*(1-f)+arr[i+1]*f; }\n\n  // bullseye: offset = bias (distance off-centre), spread = variance (scatter). Dots via cx/cy.\n  makeTarget(size, offset, spread, seed, dots){\n    const h = React.createElement, C = this.C;\n    const cx = size/2, cy = size/2, R = size*0.46;\n    const fr = [1.0, 0.82, 0.64, 0.46, 0.30, 0.15, 0.06];\n    const cols = [C.coral, '#fff', C.coral, '#fff', C.coral, '#fff', C.coral];\n    const rings = fr.map((f,i)=>h('circle',{ key:'r'+i, cx, cy, r:R*f, fill:cols[i] }));\n    const rand = this.rng(seed);\n    const dirx = 0.75, diry = 0.66;\n    const offMag = offset*R*0.78, sdMag = spread*R*0.42, cap = R*0.98;\n    const ds = [];\n    for(let i=0;i<dots;i++){\n      let gx = Math.max(-2.2, Math.min(2.2, this.gauss(rand)));\n      let gy = Math.max(-2.2, Math.min(2.2, this.gauss(rand)));\n      let dx = dirx*offMag + gx*sdMag, dy = diry*offMag + gy*sdMag;\n      const rad = Math.hypot(dx,dy);\n      if(rad>cap){ dx*=cap/rad; dy*=cap/rad; }\n      ds.push(h('circle',{ key:'d'+i, cx:+(cx+dx).toFixed(1), cy:+(cy+dy).toFixed(1), r:size*0.030, fill:C.blueDot, stroke:C.blueStroke, strokeWidth:1.4, fillOpacity:0.92 }));\n    }\n    return h('svg',{ viewBox:`-8 -8 ${size+16} ${size+16}`, width:'100%', height:'100%', style:{ display:'block', overflow:'visible' } }, rings, ds);\n  }\n\n  makeErrorPlot(c){\n    const h = React.createElement, C = this.C;\n    this.ensureDecomp(); const g = this._grid, cStar = g.cStar;\n    const W=440,H=380,L=24,Rp=18,T=42,B=46, pw=W-L-Rp, ph=H-T-B;\n    const yMax = g.yMax;\n    const X=cc=>L+cc*pw, Y=v=>T+(1-v/yMax)*ph;\n    const pathOf=arr=>{ let d=''; for(let i=0;i<arr.length;i++){ d+=(i?'L':'M')+X(g.cs[i]).toFixed(1)+' '+Y(arr[i]).toFixed(1); } return d; };\n    const base = Y(0);\n    const e = [];\n    e.push(h('rect',{ key:'zu', x:X(0), y:T, width:Math.max(0,X(cStar-0.16)-X(0)), height:ph, fill:C.blue, opacity:0.05 }));\n    e.push(h('rect',{ key:'zo', x:X(cStar+0.16), y:T, width:Math.max(0,X(1)-X(cStar+0.16)), height:ph, fill:C.coral, opacity:0.05 }));\n    e.push(h('line',{ key:'ax', x1:X(0), y1:base, x2:X(1)+6, y2:base, stroke:'#CCC4B9', strokeWidth:1.5 }));\n    e.push(h('line',{ key:'ay', x1:X(0), y1:base, x2:X(0), y2:T-6, stroke:'#CCC4B9', strokeWidth:1.5 }));\n    e.push(h('path',{ key:'axh', d:`M${X(1)+7} ${base} l-6 -4 v8 z`, fill:'#CCC4B9' }));\n    e.push(h('path',{ key:'ayh', d:`M${X(0)} ${T-7} l-4 6 h8 z`, fill:'#CCC4B9' }));\n    e.push(h('line',{ key:'min', x1:X(cStar), y1:base, x2:X(cStar), y2:T-2, stroke:'#A99F93', strokeWidth:1.4, strokeDasharray:'3 4' }));\n    e.push(h('text',{ key:'mint', x:X(cStar), y:T-9, textAnchor:'middle', fontSize:12, fontFamily:'Hanken Grotesk', fontWeight:600, fill:'#8C8379' }, 'Minimum error'));\n    e.push(h('path',{ key:'cb', d:pathOf(g.bias2), fill:'none', stroke:C.blue, strokeWidth:3, strokeLinecap:'round', strokeLinejoin:'round' }));\n    e.push(h('path',{ key:'cv', d:pathOf(g.varc), fill:'none', stroke:C.coral, strokeWidth:3, strokeLinecap:'round', strokeLinejoin:'round' }));\n    e.push(h('path',{ key:'ce', d:pathOf(g.total), fill:'none', stroke:C.gold, strokeWidth:3.6, strokeLinecap:'round', strokeLinejoin:'round' }));\n    e.push(h('line',{ key:'cur', x1:X(c), y1:base, x2:X(c), y2:T-2, stroke:C.ink, strokeWidth:1.4, opacity:0.45 }));\n    [['b',g.bias2,C.blue],['v',g.varc,C.coral],['e',g.total,C.gold]].forEach(([id,arr,col])=>{\n      e.push(h('circle',{ key:'pt'+id, cx:X(c), cy:Y(this.lerpArr(arr,c)), r:5, fill:'#fff', stroke:col, strokeWidth:2.5 }));\n    });\n    e.push(h('text',{ key:'tl', x:X(0.18), y:21, textAnchor:'middle', fontSize:10.5, fontFamily:'Hanken Grotesk', fontWeight:600, letterSpacing:'.03em', fill:'#A99F93' }, 'HIGH BIAS · LOW VAR'));\n    e.push(h('text',{ key:'tr', x:X(0.82), y:21, textAnchor:'middle', fontSize:10.5, fontFamily:'Hanken Grotesk', fontWeight:600, letterSpacing:'.03em', fill:'#A99F93' }, 'LOW BIAS · HIGH VAR'));\n    e.push(h('text',{ key:'xt', x:X(0.5), y:H-7, textAnchor:'middle', fontSize:12, fontFamily:'Hanken Grotesk', fontWeight:500, fill:'#8C8379' }, 'Model complexity →'));\n    return h('svg',{ viewBox:`0 0 ${W} ${H}`, width:'100%', height:'100%', style:{ display:'block', overflow:'visible' } }, e);\n  }\n\n  makeFitPlot(c, predict){\n    const h = React.createElement, C = this.C;\n    const W=440,H=380,L=18,Rp=18,T=18,B=40, pw=W-L-Rp, ph=H-T-B;\n    const vMin=-0.38, vMax=1.38;\n    const X=x=>L+x*pw, Y=v=>T+(1-(v-vMin)/(vMax-vMin))*ph;\n    const cl=v=>Math.max(vMin, Math.min(vMax, v));\n    const e = [];\n    e.push(h('line',{ key:'ax', x1:X(0), y1:Y(vMin), x2:X(1), y2:Y(vMin), stroke:'#ECE6DD', strokeWidth:1 }));\n    if(this.props.showTrueCurve ?? true){\n      let d=''; for(let i=0;i<=80;i++){ const x=i/80; d+=(i?'L':'M')+X(x).toFixed(1)+' '+Y(cl(this.trueF(x))).toFixed(1); }\n      e.push(h('path',{ key:'true', d, fill:'none', stroke:'#B7AFA4', strokeWidth:2, strokeDasharray:'5 5', strokeLinecap:'round' }));\n    }\n    let df=''; for(let i=0;i<=120;i++){ const x=i/120; df+=(i?'L':'M')+X(x).toFixed(1)+' '+Y(cl(predict(x))).toFixed(1); }\n    e.push(h('path',{ key:'fit', d:df, fill:'none', stroke:C.coral, strokeWidth:3.4, strokeLinecap:'round', strokeLinejoin:'round' }));\n    this._xs.forEach((x,i)=>{ e.push(h('circle',{ key:'p'+i, cx:X(x), cy:Y(cl(this._ys[i])), r:5, fill:C.blueDot, stroke:C.blueStroke, strokeWidth:1.5, fillOpacity:0.9 })); });\n    return h('svg',{ viewBox:`0 0 ${W} ${H}`, width:'100%', height:'100%', style:{ display:'block' } }, e);\n  }\n\n  renderVals(){\n    const C = this.C, c = this.state.c;\n    this.ensureDecomp(); const g = this._grid, cStar = g.cStar;\n    const UND = cStar - 0.16, OVR = cStar + 0.16;\n    const b2 = this.lerpArr(g.bias2, c), vv = this.lerpArr(g.varc, c), total = this.lerpArr(g.total, c);\n    const aimFrac = Math.min(1, Math.sqrt(b2)/g.biasMax);      // offset = |bias| = √(bias²)\n    const spreadFrac = Math.min(1, Math.sqrt(vv)/g.stdMax);    // scatter = std = √(variance)\n    let regime='Just right', rc=C.gold, note='Bias and variance balanced — total error at its minimum';\n    if(c < UND){ regime='Underfitting'; rc=C.blue; note='Model too simple — bias dominates'; }\n    else if(c > OVR){ regime='Overfitting'; rc=C.coral; note='Model too complex — variance dominates'; }\n    const minNear = Math.abs(c-cStar) < 0.045;\n    const predict = this.fit(c);\n    const xs=this._xs, ys=this._ys;\n    let tr=0; for(let i=0;i<xs.length;i++){ const d=predict(xs[i])-ys[i]; tr+=d*d; } tr/=xs.length;\n    // test = error on the independent held-out set → falls, then rises again once the model overfits\n    const txs=this._txs, tys=this._tys; let te=0; for(let i=0;i<txs.length;i++){ const d=predict(txs[i])-tys[i]; te+=d*d; } te/=txs.length;\n    const cPct=(c*100).toFixed(1)+'%';\n    const dots = Math.max(7, Math.min(12, Math.round(this.props.numShots ?? 10)));\n    return {\n      c,\n      onSlide:(e)=>this.setState({ c:parseFloat(e.target.value), playing:false }),\n      setUnder:()=>this.setState({ c:0.05, playing:false }),\n      setJust:()=>this.setState({ c:+cStar.toFixed(3), playing:false }),\n      setOver:()=>this.setState({ c:0.96, playing:false }),\n      togglePlay:()=>this.setState(s=>({ playing:!s.playing })),\n      playLabel:this.state.playing?'Pause':'Play',\n      playGlyph:this.state.playing?'❚❚':'▶',\n      regime, regimeNote:note,\n      regimePillStyle:{ display:'inline-flex', alignItems:'center', padding:'7px 15px', borderRadius:'99px', background:rc, color:'#fff', fontWeight:600, fontSize:'14px', whiteSpace:'nowrap', boxShadow:`0 7px 18px -8px ${rc}`, transition:'background .3s' },\n      sliderInputStyle:{ WebkitAppearance:'none', appearance:'none', width:'100%', height:'8px', borderRadius:'99px', outline:'none', margin:0, background:`linear-gradient(90deg, ${C.coral} 0%, ${C.coral} ${cPct}, #ECE6DD ${cPct}, #ECE6DD 100%)` },\n      targetViz:this.makeTarget(300, aimFrac, spreadFrac, 7, dots),\n      fitViz:this.makeFitPlot(c, predict),\n      errorViz:this.makeErrorPlot(c),\n      quadLL:this.makeTarget(150, 0.05, 0.12, 41, 9),\n      quadHL:this.makeTarget(150, 0.82, 0.12, 42, 9),\n      quadLH:this.makeTarget(150, 0.05, 0.78, 43, 11),\n      quadHH:this.makeTarget(150, 0.82, 0.78, 44, 11),\n      quadMarkerStyle:{ position:'absolute', left:`${75-50*c}%`, top:`${25+50*c}%`, width:'24px', height:'24px', marginLeft:'-12px', marginTop:'-12px', borderRadius:'50%', border:`3px solid ${C.ink}`, background:'rgba(255,255,255,.55)', boxShadow:'0 2px 8px rgba(0,0,0,.28)', pointerEvents:'none', transition:'left .25s ease, top .25s ease' },\n      aimPctTxt:Math.round(aimFrac*100)+'%',\n      spreadPctTxt:Math.round(spreadFrac*100)+'%',\n      aimBarStyle:{ width:Math.round(aimFrac*100)+'%', height:'100%', borderRadius:'99px', background:C.blue, transition:'width .2s ease' },\n      spreadBarStyle:{ width:Math.round(spreadFrac*100)+'%', height:'100%', borderRadius:'99px', background:C.coral, transition:'width .2s ease' },\n      biasSqTxt:b2.toFixed(3), varTxt:vv.toFixed(3), irrTxt:g.sig2.toFixed(3), totalTxt:total.toFixed(3),\n      trainTxt:tr.toFixed(3), testTxt:te.toFixed(3),\n      biasGlowStyle:{ position:'absolute', inset:'-1.5px', borderRadius:'17.5px', border:`2px solid ${C.blue}`, boxShadow:`0 14px 34px -16px ${C.blue}88`, opacity:c<UND?1:0, transition:'opacity .35s ease', pointerEvents:'none' },\n      varGlowStyle:{ position:'absolute', inset:'-1.5px', borderRadius:'17.5px', border:`2px solid ${C.coral}`, boxShadow:`0 14px 34px -16px ${C.coral}88`, opacity:c>OVR?1:0, transition:'opacity .35s ease', pointerEvents:'none' },\n      minBadgeStyle:{ display:'inline-flex', alignItems:'center', gap:'5px', padding:'4px 10px', borderRadius:'99px', background:'#EAF3EC', color:'#2E7D46', fontSize:'12px', fontWeight:600, opacity:minNear?1:0, transform:minNear?'none':'translateY(3px)', transition:'opacity .3s ease, transform .3s ease' },\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
